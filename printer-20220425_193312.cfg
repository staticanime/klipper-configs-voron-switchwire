# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v2.0. To use this config, the firmware should be compiled for the
# STM32F103 with a "28KiB bootloader". Also, select "Enable extra
# low-level configuration options" and configure "GPIO pins to set at
# micro-controller startup" to "!PA14".
# ======================================================================

[mcu]
##	Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_37FFD9054246303438720657-if00
#restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2000
max_accel_to_decel: 2000
max_z_velocity: 50 
max_z_accel: 100
square_corner_velocity: 5

[input_shaper]
shaper_freq_x: 49.6
shaper_type_x: 3hump_ei
shaper_freq_y: 66.8
shaper_type_y: 3hump_ei

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points: 117.5,117.5,20  # an example

#####################################################################
# 	X Stepper Settings
#####################################################################

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^PC0
position_min: 0
##--------------------------------------------------------------------
position_endstop: 0
position_max: 240
##--------------------------------------------------------------------
homing_speed: 50   #Max 100

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580

#####################################################################
# 	Y Stepper Settings
#####################################################################

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^PC1
position_min: -5
##--------------------------------------------------------------------
position_endstop: -5
position_max: 235
##--------------------------------------------------------------------
homing_speed: 50   #Max 100

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.5

#####################################################################
# 	Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
rotation_distance: 10
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: probe:z_virtual_endstop
position_min: -5
##--------------------------------------------------------------------
position_max: 250
##--------------------------------------------------------------------
homing_speed: 25   #Max 100

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.5

#####################################################################
# 	Extruder
#####################################################################

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD2
##	Update value below when you perform extruder calibration
rotation_distance: 4.637
#gear_ratio: 50:17				#BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: PC8
##	Validate the following thermistor type to make sure it is correct
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA0
min_extrude_temp: 170
max_extrude_only_distance: 500
max_extrude_only_velocity: 60
max_extrude_only_accel: 600
min_temp: 0
max_temp: 270
pressure_advance: 0.02
pressure_advance_smooth_time: 0.04

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.85
stealthchop_threshold: 0

[firmware_retraction]
retract_length: 0.5
retract_speed: 60
unretract_extra_length: 0.0
unretract_speed: 60

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
heater_pin: PC9
##	Validate the following thermistor type to make sure it is correct
sensor_type: Generic 3950
sensor_pin: PC3
min_temp: 0
max_temp: 130
control: pid
pid_kp: 65.746
pid_ki: 1.789
pid_kd: 604.045
#pwm_cycle_time: 0.02

#####################################################################
# 	Probe
#####################################################################

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
pin_move_time: 0.4
stow_on_each_sample: False
probe_with_touch_mode: True
x_offset: -37.5
y_offset: 6.5
#z_offset: 0
speed: 20
lift_speed: 20
sample_retract_dist: 10
samples: 3
samples_result: median
samples_tolerance: 0.02
samples_tolerance_retries: 3

#####################################################################
# 	Fan Control
#####################################################################

[fan]
pin: PC6

[heater_fan controller_fan]
pin: PC7
heater: extruder
heater_temp: 50.0

[temperature_sensor RPI_CPU_Temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor SKR_CPU_Temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#####################################################################
# 	LED Control
#####################################################################

[neopixel hotend_leds]
pin: PA8
chain_count: 8
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[bed_mesh]
speed: 100
horizontal_move_z: 10
mesh_min: 10,10
mesh_max: 200,220
probe_count: 19,21
mesh_pps: 2
algorithm: bicubic
bicubic_tension: 0.2
move_check_distance: 5
split_delta_z: .025
fade_start: 1
fade_end: 10
fade_target: 0

[safe_z_home]
home_xy_position: 154.5,112.5
speed: 100
z_hop: 10 
z_hop_speed: 50

[screws_tilt_adjust]
horizontal_move_z: 10
screw1: 66,31
screw1_name: Front Left
screw2: 234,31
screw2_name: Front Right
screw3: 234,200
screw3_name: Rear Right
screw4: 66,200
screw4_name: Rear Left
screw_thread: CW-M4
speed: 100

#####################################################################
# 	Displays
#####################################################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5, EXP1_3=PA9,
	EXP1_5=PA10, EXP1_7=PB8,
	EXP1_9=<GND>, EXP1_2=PA15,
	EXP1_4=<RST>, EXP1_6=PB9,
	EXP1_8=PB15, EXP1_10=<5V>

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

[static_digital_output usb_pullup_enable]
pins: !PA14

#####################################################################
# 	Macros
#####################################################################

#[include macros/buzzer.cfg]
[include macros/hotend_leds.cfg]
[include macros/linear_advance.cfg]
#[include macros/move_nozzle.cfg]
[include macros/nozzle_prime.cfg]
[include macros/print_cancel.cfg]
[include macros/print_end.cfg]
[include macros/print_pause.cfg]
[include macros/print_resume.cfg]
[include macros/print_start.cfg]
[include macros/safe_park.cfg]
[include macros/safe_retract.cfg]
[include macros/test_speed.cfg]
[include macros/tram_dual_z.cfg]
[include mainsail.cfg]
[include timelapse.cfg]

