[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
rotation_distance: 40
microsteps: 16

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 40
microsteps: 16

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
rotation_distance: 10
microsteps: 16
position_min: -5
endstop_pin: probe:z_virtual_endstop
position_max: 250
homing_speed: 25

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD2
microsteps: 16