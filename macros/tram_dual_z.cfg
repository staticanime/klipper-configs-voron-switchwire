[force_move]
enable_force_move: True

[gcode_macro TRAM_Z]
gcode:
    G28
    G1 Z250 F1000
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={0.1} # Makes the motor operate with less power so mothing breaks.
    FORCE_MOVE STEPPER=stepper_z DISTANCE={15} VELOCITY={5} ACCEL={5} # The motor will make some noise when it touches the top beam. Adjust the z travel if possible/needed.
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT={0.5} # Set this to your normal default z run_current.
    G28 Z