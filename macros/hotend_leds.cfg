[gcode_macro M105]
rename_existing:            M105.1
gcode:  

   M105.1
   #if the extruder is off
   {% if printer.extruder.target == 0 %}
      #Set the LED to red if the extruder is off but is still hot, otherwise 
      # set the color to green
      {% if printer.extruder.temperature > 50.0 %}
         SET_LED LED=hotend_leds RED=1 GREEN=0 BLUE=0 INDEX=1 TRANSMIT=1
      {% else %}
         SET_LED LED=hotend_leds RED=0 GREEN=1 BLUE=0 INDEX=1 TRANSMIT=1
      {% endif %}     
   {% else %}
         #if the extruder temp is at target temperature 
         {% if printer.extruder.temperature >= printer.extruder.target - 5.0 %}
            SET_LED LED=hotend_leds RED=1 GREEN=0 BLUE=0 INDEX=1 TRANSMIT=1
         #if the extruder is still heating
         {% else %}
            {% set scaler = printer.extruder.temperature|float / printer.extruder.target|float %}
            SET_LED LED=hotend_leds RED={ scaler|float * 1 } GREEN=0 BLUE=0 INDEX=1 TRANSMIT=1
         {% endif %}  
   {% endif %}

[gcode_macro TURN_NOZZLE_LEDS_ON]
gcode:
    SET_LED LED=hotend_leds RED=0.0 GREEN=0.5 BLUE=0.5

[gcode_macro TURN_NOZZLE_LEDS_OFF]
gcode:
    SET_LED LED=hotend_leds RED=0.0 GREEN=0.0 BLUE=0.0